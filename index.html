<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>XAUUSD Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#09090b;--surface:#111113;--card:#18181c;--border:#27272a;--gold:#f5c542;--gold2:#e8a820;--buy:#22c55e;--sell:#ef4444;--hold:#94a3b8;--text:#fafafa;--muted:#71717a;--font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;max-width:480px;margin:0 auto;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,66,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,66,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;padding:0 0 40px;}
  header{display:flex;align-items:center;justify-content:space-between;padding:48px 16px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px rgba(245,197,66,0.3);}
  .logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
  .logo-text span{color:var(--gold);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .live-dot{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--muted);}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--buy);box-shadow:0 0 5px var(--buy);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all 0.2s;}
  .refresh-btn:hover{border-color:var(--gold);color:var(--gold);}
  .content{padding:16px;display:flex;flex-direction:column;gap:12px;}
  .error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:12px 16px;border-radius:10px;font-family:var(--mono);font-size:12px;display:none;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;animation:fadeUp 0.4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card-label{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
  .price-card{border-color:rgba(245,197,66,0.2);}
  .price-value{font-size:38px;font-weight:700;color:var(--gold);letter-spacing:-1.5px;line-height:1;margin-bottom:6px;}
  .price-sub{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:6px;border-width:1px;border-style:solid;font-size:13px;font-weight:700;letter-spacing:2px;margin-bottom:16px;}
  .badge-dot{width:7px;height:7px;border-radius:50%;}
  .signal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .signal-row:last-of-type{border-bottom:none;}
  .row-label{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .row-value{font-family:var(--mono);font-size:13px;font-weight:500;}
  .conf-bar-bg{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
  .conf-bar-fill{height:4px;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:2px;transition:width 0.8s ease;}
  .reason-text{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.6;margin-top:10px;}
  .strategies-grid{display:flex;flex-direction:column;gap:10px;}
  .strategy-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;}
  .strategy-card.active-buy{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.05);}
  .strategy-card.active-sell{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.05);}
  .strategy-left{flex:1;}
  .strategy-name{font-size:13px;font-weight:700;margin-bottom:4px;}
  .strategy-reason{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.4;}
  .strategy-badge{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;white-space:nowrap;margin-left:10px;}
  .trend-card{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .trend-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
  .trend-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .trend-value{font-size:15px;font-weight:700;}
  .news-item{padding:10px 0;border-bottom:1px solid var(--border);}
  .news-item:last-child{border-bottom:none;}
  .news-headline{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:4px;}
  .news-meta{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--muted);}
  .news-impact{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1px;}
  .news-impact.HIGH{background:rgba(239,68,68,0.15);color:var(--sell);}
  .news-impact.NORMAL{background:rgba(148,163,184,0.1);color:var(--muted);}
  .news-block-warning{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:11px;color:#fca5a5;margin-bottom:10px;}
  .section-divider{display:flex;align-items:center;gap:10px;margin:4px 0;}
  .section-divider-line{flex:1;height:1px;background:var(--border);}
  .section-divider-text{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;}
  .scalp-card{border-color:rgba(245,197,66,0.1);background:linear-gradient(135deg,#111113,#13121a);}
  .scalp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .scalp-title{font-size:14px;font-weight:700;}
  .timeframe-tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;background:rgba(245,197,66,0.1);color:var(--gold);border:1px solid rgba(245,197,66,0.2);}
  .scalp-indicators{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
  .indicator-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
  .indicator-label{font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;}
  .indicator-value{font-family:var(--mono);font-size:13px;font-weight:600;}
  /* Stats grid */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
  .stat-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .stat-val{font-size:22px;font-weight:700;}
  /* Calendar */
  .cal-item{padding:10px 0;border-bottom:1px solid var(--border);}
  .cal-item:last-child{border-bottom:none;}
  .cal-event{font-size:12px;font-weight:600;margin-bottom:4px;}
  .cal-meta{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--muted);}
  .cal-impact{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1px;}
  .cal-impact.HIGH{background:rgba(239,68,68,0.15);color:var(--sell);}
  .cal-impact.NORMAL{background:rgba(148,163,184,0.1);color:var(--muted);}
  /* Recent signals */
  .log-entry{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;}
  .log-entry:last-child{border-bottom:none;}
  .log-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;}
  .log-result{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
  .log-result.WIN{background:rgba(34,197,94,0.15);color:var(--buy);}
  .log-result.LOSS{background:rgba(239,68,68,0.15);color:var(--sell);}
  .log-result.PENDING{background:rgba(148,163,184,0.1);color:var(--muted);}
  .footer{text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px;}
  .loader{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-family:var(--mono);font-size:12px;}
  .spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:4px;}
  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .stat-value{font-size:16px;font-weight:700;color:var(--text);margin-top:4px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div class="logo-text">XAU<span>/USD</span> Bot</div>
    </div>
    <div class="header-right">
      <div class="live-dot"><div class="dot"></div><span id="last-update">connecting...</span></div>
      <button class="refresh-btn" onclick="loadAll()">↻</button>
    </div>
  </header>
  <div class="content">
    <div id="error-box" class="error-box"></div>
    <div id="main-content"><div class="loader"><div class="spin"></div> Loading Gold data...</div></div>
  </div>
</div>
<script>
const API='https://xauusd-bot-production-2474.up.railway.app/api';
const log=[];
function fmt(n){if(n==null)return'—';return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function timeAgo(iso){const d=Math.floor((Date.now()-new Date(iso))/1000);if(d<60)return d+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';return Math.floor(d/3600)+'h ago';}
function sc(t){return t==='BUY'?'var(--buy)':t==='SELL'?'var(--sell)':'var(--hold)';}
function sb(t){return t==='BUY'?'rgba(34,197,94,0.15)':t==='SELL'?'rgba(239,68,68,0.15)':'rgba(148,163,184,0.1)';}
function sbo(t){return t==='BUY'?'rgba(34,197,94,0.3)':t==='SELL'?'rgba(239,68,68,0.3)':'rgba(148,163,184,0.2)';}
function scls(t){return t==='BUY'?'active-buy':t==='SELL'?'active-sell':'';}
function extractIndicator(reason,key){const m=reason.match(new RegExp(key+'=([\\d.\\-]+)'));return m?m[1]:'—';}
function trendColor(t){return t==='UPTREND'?'var(--buy)':t==='DOWNTREND'?'var(--sell)':'var(--hold)';}
function trendEmoji(t){return t==='UPTREND'?'↑':t==='DOWNTREND'?'↓':'→';}

async function loadAll(){
  try{
    const[sigRes,allRes,scalpRes,newsRes,calRes,statsRes]=await Promise.all([
      fetch(API+'/signal'),
      fetch(API+'/all-signals'),
      fetch(API+'/scalp-signal'),
      fetch(API+'/news'),
      fetch(API+'/calendar'),
      fetch(API+'/stats'),
    ]);
    const best=await sigRes.json();
    const all=await allRes.json();
    const scalp=await scalpRes.json();
    const newsData=await newsRes.json();
    const calData=await calRes.json();
    const stats=await statsRes.json();

    if(best.price) log.unshift({...best,logged:new Date().toISOString()});
    if(log.length>15)log.pop();

    const conf=Math.round((best.confidence||0)*100);
    const activeCount=Array.isArray(all)?all.filter(s=>s.type!=='HOLD').length:0;
    const scalpConf=Math.round((scalp.confidence||0)*100);
    const rsi=extractIndicator(scalp.reason||'','RSI');
    const macd=extractIndicator(scalp.reason||'','MACD');
    const trend=best.trend||'NEUTRAL';
    const ema200=best.ema200||0;
    const newsBlock=best.news_block||false;
    const articles=newsData.articles||[];
    const events=calData.events||[];
    const recent=stats.recent||[];

    document.getElementById('main-content').innerHTML=`

      <!-- Price -->
      <div class="card price-card">
        <div class="card-label">Gold Price</div>
        <div class="price-value">${fmt(best.price)}</div>
        <div class="price-sub">XAU/USD · live · ${activeCount} active signal${activeCount!==1?'s':''}</div>
      </div>

      <!-- Trend -->
      <div class="trend-card">
        <div class="trend-box" style="border-color:${trendColor(trend)}33">
          <div class="trend-label">Trend (EMA 200)</div>
          <div class="trend-value" style="color:${trendColor(trend)}">${trendEmoji(trend)} ${trend}</div>
        </div>
        <div class="trend-box">
          <div class="trend-label">EMA 200</div>
          <div class="trend-value" style="color:var(--gold)">${fmt(ema200)}</div>
        </div>
      </div>

      ${newsBlock?'<div class="news-block-warning">⚠ High impact news — signals blocked for safety</div>':''}

      <!-- Win Rate Stats -->
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-text">📊 Performance</div>
        <div class="section-divider-line"></div>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Win Rate</div>
          <div class="stat-val" style="color:${stats.win_rate>=50?'var(--buy)':'var(--sell)'}">${stats.win_rate}%</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Total P&L</div>
          <div class="stat-val" style="color:${stats.total_pnl>=0?'var(--buy)':'var(--sell)'}">${stats.total_pnl>=0?'+':''}${stats.total_pnl}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Wins</div>
          <div class="stat-val" style="color:var(--buy)">${stats.wins}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Losses</div>
          <div class="stat-val" style="color:var(--sell)">${stats.losses}</div>
        </div>
      </div>

      <!-- Swing section -->
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-text">⏱ Swing Trading · 1H</div>
        <div class="section-divider-line"></div>
      </div>

      <div class="card" style="border-color:rgba(245,197,66,0.15)">
        <div class="card-label">Best Signal</div>
        <div class="badge" style="background:${sb(best.type)};border-color:${sbo(best.type)}">
          <div class="badge-dot" style="background:${sc(best.type)}"></div>
          <span style="color:${sc(best.type)}">${best.type||'HOLD'}</span>
        </div>
        <div class="signal-row"><span class="row-label">Entry price</span><span class="row-value">${fmt(best.price)}</span></div>
        <div class="signal-row"><span class="row-label">Stop loss</span><span class="row-value" style="color:var(--sell)">${fmt(best.stop_loss)}</span></div>
        <div class="signal-row"><span class="row-label">Take profit</span><span class="row-value" style="color:var(--buy)">${fmt(best.take_profit)}</span></div>
        <div class="signal-row"><span class="row-label">Strategy</span><span class="row-value">${best.strategy||'—'}</span></div>
        <div class="signal-row"><span class="row-label">Confidence</span><span class="row-value">${conf}%</span></div>
        <div class="conf-bar-bg"><div class="conf-bar-fill" style="width:${Math.min(conf,100)}%"></div></div>
        <div class="reason-text">${best.reason||'—'}</div>
      </div>

      <div class="section-title">All 1H Strategies</div>
      <div class="strategies-grid">
        ${(Array.isArray(all)?all:[]).map(s=>`
          <div class="strategy-card ${scls(s.type)}">
            <div class="strategy-left">
              <div class="strategy-name">${s.strategy}</div>
              <div class="strategy-reason">${s.reason}</div>
            </div>
            <div class="strategy-badge" style="background:${sb(s.type)};color:${sc(s.type)};border:1px solid ${sbo(s.type)}">${s.type}</div>
          </div>`).join('')}
      </div>

      <!-- Scalp section -->
      <div class="section-divider" style="margin-top:8px">
        <div class="section-divider-line"></div>
        <div class="section-divider-text">⚡ Scalping · 5M</div>
        <div class="section-divider-line"></div>
      </div>

      <div class="card scalp-card">
        <div class="scalp-header">
          <div class="scalp-title">Scalp Signal</div>
          <div class="timeframe-tag">5 MIN</div>
        </div>
        <div class="badge" style="background:${sb(scalp.type)};border-color:${sbo(scalp.type)}">
          <div class="badge-dot" style="background:${sc(scalp.type)}"></div>
          <span style="color:${sc(scalp.type)}">${scalp.type||'HOLD'}</span>
        </div>
        <div class="scalp-indicators">
          <div class="indicator-box">
            <div class="indicator-label">RSI (7)</div>
            <div class="indicator-value" style="color:${parseFloat(rsi)>50?'var(--buy)':parseFloat(rsi)<50?'var(--sell)':'var(--hold)'}">${rsi}</div>
          </div>
          <div class="indicator-box">
            <div class="indicator-label">MACD</div>
            <div class="indicator-value" style="color:${parseFloat(macd)>0?'var(--buy)':parseFloat(macd)<0?'var(--sell)':'var(--hold)'}">${macd}</div>
          </div>
          <div class="indicator-box">
            <div class="indicator-label">Confidence</div>
            <div class="indicator-value" style="color:var(--gold)">${scalpConf}%</div>
          </div>
        </div>
        <div class="signal-row"><span class="row-label">Entry price</span><span class="row-value">${fmt(scalp.price)}</span></div>
        <div class="signal-row"><span class="row-label">Stop loss</span><span class="row-value" style="color:var(--sell)">${fmt(scalp.stop_loss)}</span></div>
        <div class="signal-row"><span class="row-label">Take profit</span><span class="row-value" style="color:var(--buy)">${fmt(scalp.take_profit)}</span></div>
        <div class="reason-text">${scalp.reason||'—'}</div>
      </div>

      <!-- Economic Calendar -->
      <div class="section-divider" style="margin-top:8px">
        <div class="section-divider-line"></div>
        <div class="section-divider-text">📅 Economic Calendar</div>
        <div class="section-divider-line"></div>
      </div>

      <div class="card">
        <div class="card-label">Upcoming Events (7 days)</div>
        ${events.length===0
          ?'<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:8px 0">No major US events this week</div>'
          :events.map(e=>`
            <div class="cal-item">
              <div class="cal-event">${e.event}</div>
              <div class="cal-meta">
                <span class="cal-impact ${e.impact}">${e.impact}</span>
                <span>${e.date}</span>
                <span>${e.time}</span>
                ${e.estimate?`<span>Est: ${e.estimate}</span>`:''}
                ${e.prev?`<span>Prev: ${e.prev}</span>`:''}
              </div>
            </div>`).join('')}
      </div>

      <!-- News -->
      <div class="section-divider" style="margin-top:8px">
        <div class="section-divider-line"></div>
        <div class="section-divider-text">📰 Gold News</div>
        <div class="section-divider-line"></div>
      </div>

      <div class="card">
        <div class="card-label">Latest News</div>
        ${articles.length===0
          ?'<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:8px 0">No Gold news at the moment</div>'
          :articles.map(a=>`
            <div class="news-item">
              <div class="news-headline">${a.headline}</div>
              <div class="news-meta">
                <span class="news-impact ${a.impact}">${a.impact}</span>
                <span>${a.source}</span>
                <span>${a.time}</span>
              </div>
            </div>`).join('')}
      </div>

      <!-- Recent signals from tracker -->
      <div class="section-divider" style="margin-top:8px">
        <div class="section-divider-line"></div>
        <div class="section-divider-text">🕒 Recent Signals</div>
        <div class="section-divider-line"></div>
      </div>

      <div class="card">
        <div class="card-label">Signal History</div>
        ${recent.length===0
          ?'<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:8px 0">No signals recorded yet</div>'
          :recent.map(h=>`
            <div class="log-entry">
              <span class="log-badge" style="background:${sb(h.type)};color:${sc(h.type)}">${h.type}</span>
              <span style="flex:1;margin:0 8px;font-size:11px;color:var(--muted)">${h.strategy||'—'}</span>
              <span style="margin-right:8px">${fmt(h.price)}</span>
              <span class="log-result ${h.result}">${h.result}</span>
            </div>`).join('')}
      </div>

      <!-- Bottom stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="card-label">Total Signals</div>
          <div class="stat-value">${stats.total_signals}</div>
        </div>
        <div class="stat-card">
          <div class="card-label">Pending</div>
          <div class="stat-value" style="color:var(--gold)">${stats.pending}</div>
        </div>
      </div>

      <div class="footer">Refreshes every 5 mins · Trend + News + Calendar filtered</div>
    `;

    document.getElementById('last-update').textContent='updated '+new Date().toLocaleTimeString();
    document.getElementById('error-box').style.display='none';

  }catch(e){
    document.getElementById('error-box').style.display='block';
    document.getElementById('error-box').textContent='⚠ Cannot reach backend: '+e.message;
  }
}

loadAll();
setInterval(loadAll,300000);
</script>
</body>
</html>
