<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>XAUUSD Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#09090b;--surface:#111113;--card:#18181c;--border:#27272a;
    --gold:#f5c542;--gold2:#e8a820;--buy:#22c55e;--sell:#ef4444;
    --hold:#94a3b8;--text:#fafafa;--muted:#71717a;
    --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;max-width:480px;margin:0 auto;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,66,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,66,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;padding:0 0 40px;}
  header{display:flex;align-items:center;justify-content:space-between;padding:48px 16px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px rgba(245,197,66,0.3);}
  .logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
  .logo-text span{color:var(--gold);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .live-dot{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--muted);}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--buy);box-shadow:0 0 5px var(--buy);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all 0.2s;}
  .refresh-btn:hover{border-color:var(--gold);color:var(--gold);}
  .content{padding:16px;display:flex;flex-direction:column;gap:12px;}
  .error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:12px 16px;border-radius:10px;font-family:var(--mono);font-size:12px;display:none;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;animation:fadeUp 0.4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card-label{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
  .price-card{border-color:rgba(245,197,66,0.2);}
  .price-value{font-size:38px;font-weight:700;color:var(--gold);letter-spacing:-1.5px;line-height:1;margin-bottom:6px;}
  .price-sub{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:6px;border-width:1px;border-style:solid;font-size:13px;font-weight:700;letter-spacing:2px;margin-bottom:16px;}
  .badge-dot{width:7px;height:7px;border-radius:50%;}
  .signal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .signal-row:last-of-type{border-bottom:none;}
  .row-label{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .row-value{font-family:var(--mono);font-size:13px;font-weight:500;}
  .conf-bar-bg{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
  .conf-bar-fill{height:4px;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:2px;transition:width 0.8s ease;}
  .reason-text{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.6;margin-top:10px;}
  .strategies-grid{display:flex;flex-direction:column;gap:10px;}
  .strategy-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;}
  .strategy-card.active-buy{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.05);}
  .strategy-card.active-sell{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.05);}
  .strategy-left{flex:1;}
  .strategy-name{font-size:13px;font-weight:700;margin-bottom:4px;}
  .strategy-reason{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.4;}
  .strategy-badge{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;white-space:nowrap;margin-left:10px;}
  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .stat-value{font-size:16px;font-weight:700;color:var(--text);margin-top:4px;}
  .log-entry{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;}
  .log-entry:last-child{border-bottom:none;}
  .log-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;}
  .log-strat{flex:1;margin:0 8px;color:var(--muted);font-size:10px;}
  .log-time{color:var(--muted);font-size:10px;}
  .footer{text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px;}
  .loader{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-family:var(--mono);font-size:12px;}
  .spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:4px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div class="logo-text">XAU<span>/USD</span> Bot</div>
    </div>
    <div class="header-right">
      <div class="live-dot"><div class="dot"></div><span id="last-update">connecting...</span></div>
      <button class="refresh-btn" onclick="loadAll()">↻</button>
    </div>
  </header>
  <div class="content">
    <div id="error-box" class="error-box"></div>
    <div id="main-content"><div class="loader"><div class="spin"></div> Loading Gold data...</div></div>
  </div>
</div>
<script>
const API='https://xauusd-bot-production-2474.up.railway.app/api';
const log=[];
function fmt(n){if(n==null)return'—';return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function timeAgo(iso){const d=Math.floor((Date.now()-new Date(iso))/1000);if(d<60)return d+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';return Math.floor(d/3600)+'h ago';}
function sc(t){return t==='BUY'?'var(--buy)':t==='SELL'?'var(--sell)':'var(--hold)';}
function sb(t){return t==='BUY'?'rgba(34,197,94,0.15)':t==='SELL'?'rgba(239,68,68,0.15)':'rgba(148,163,184,0.1)';}
function sbo(t){return t==='BUY'?'rgba(34,197,94,0.3)':t==='SELL'?'rgba(239,68,68,0.3)':'rgba(148,163,184,0.2)';}
function scls(t){return t==='BUY'?'active-buy':t==='SELL'?'active-sell':'';}
async function loadAll(){
  try{
    const[sigRes,allRes]=await Promise.all([fetch(API+'/signal'),fetch(API+'/all-signals')]);
    const best=await sigRes.json();
    const all=await allRes.json();
    log.unshift({...best,logged:new Date().toISOString()});
    if(log.length>15)log.pop();
    const conf=Math.round((best.confidence||0)*100);
    const activeCount=Array.isArray(all)?all.filter(s=>s.type!=='HOLD').length:0;
    document.getElementById('main-content').innerHTML=`
      <div class="card price-card">
        <div class="card-label">Gold Price</div>
        <div class="price-value">${fmt(best.price)}</div>
        <div class="price-sub">XAU/USD · live · ${activeCount} active signal${activeCount!==1?'s':''}</div>
      </div>
      <div class="card" style="border-color:rgba(245,197,66,0.15)">
        <div class="card-label">Best Signal</div>
        <div class="badge" style="background:${sb(best.type)};border-color:${sbo(best.type)}">
          <div class="badge-dot" style="background:${sc(best.type)}"></div>
          <span style="color:${sc(best.type)}">${best.type}</span>
        </div>
        <div class="signal-row"><span class="row-label">Entry price</span><span class="row-value">${fmt(best.price)}</span></div>
        <div class="signal-row"><span class="row-label">Stop loss</span><span class="row-value" style="color:var(--sell)">${fmt(best.stop_loss)}</span></div>
        <div class="signal-row"><span class="row-label">Take profit</span><span class="row-value" style="color:var(--buy)">${fmt(best.take_profit)}</span></div>
        <div class="signal-row"><span class="row-label">Confidence</span><span class="row-value">${conf}%</span></div>
        <div class="conf-bar-bg"><div class="conf-bar-fill" style="width:${conf}%"></div></div>
        <div class="reason-text">${best.reason}</div>
      </div>
      <div class="section-title">All Strategies</div>
      <div class="strategies-grid">
        ${(Array.isArray(all)?all:[]).map(s=>`
          <div class="strategy-card ${scls(s.type)}">
            <div class="strategy-left">
              <div class="strategy-name">${s.strategy}</div>
              <div class="strategy-reason">${s.reason}</div>
            </div>
            <div class="strategy-badge" style="background:${sb(s.type)};color:${sc(s.type)};border:1px solid ${sbo(s.type)}">${s.type}</div>
          </div>`).join('')}
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="card-label">Strategy</div><div class="stat-value" style="font-size:12px">${best.strategy||'—'}</div></div>
        <div class="stat-card"><div class="card-label">Risk/Reward</div><div class="stat-value">1 : 2</div></div>
      </div>
      <div class="card">
        <div class="card-label">Signal History</div>
        ${log.length===0
          ?'<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:8px 0">No signals yet this session</div>'
          :log.map(h=>`<div class="log-entry"><span class="log-badge" style="background:${sb(h.type)};color:${sc(h.type)}">${h.type}</span><span class="log-strat">${h.strategy||'—'}</span><span class="log-price">${fmt(h.price)}</span><span class="log-time">${timeAgo(h.logged)}</span></div>`).join('')}
      </div>
      <div class="footer">Auto-refreshes every 60 seconds</div>`;
    document.getElementById('last-update').textContent='updated '+new Date().toLocaleTimeString();
    document.getElementById('error-box').style.display='none';
  }catch(e){
    document.getElementById('error-box').style.display='block';
    document.getElementById('error-box').textContent='⚠ Cannot reach backend: '+e.message;
  }
}
loadAll();
setInterval(loadAll,60000);
</script>
</body>
</html>
